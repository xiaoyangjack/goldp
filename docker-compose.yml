# 黄金量化交易系统 Docker Compose 配置
# Phase 3 - 部署方案

version: '3.8'

services:
  goldquant:
    build: .
    container_name: goldquant-web
    ports:
      - "5555:5555"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5555
      - LOG_LEVEL=INFO
      - DATA_REFRESH_INTERVAL=60
      - CACHE_TIMEOUT=300
      - SERVER_CHAN_KEY=${SERVER_CHAN_KEY}
      - WECHAT_WEBHOOK=${WECHAT_WEBHOOK}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
      - DRAWDOWN_THRESHOLD=10.0
      - PRICE_CHANGE_THRESHOLD=2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 30s
      timeout: 10s
      retries: 3